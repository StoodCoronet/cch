<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCH</title>
<style>
:root {
  /* DeepSeek-inspired dark-first palette */
  --bg: #0d0d0d;
  --bg-elevated: #171717;
  --bg-hover: #1f1f1f;
  --bg-active: #262626;
  --bg-input: #1e1e1e;
  --fg: #f5f5f5;
  --fg-secondary: #a3a3a3;
  --fg-tertiary: #737373;
  --border: #262626;
  --border-strong: #333333;
  --accent: #4f46e5;
  --accent-hover: #5b54e6;
  --accent-light: #818cf8;
  --user-bubble: #262626;
  --assistant-bubble: transparent;
  --code-bg: #161616;
  --green: #22c55e;
  --red: #ef4444;
  --shadow: 0 4px 24px rgba(0,0,0,.35);
}
[data-theme="light"] {
  --bg: #fafafa;
  --bg-elevated: #ffffff;
  --bg-hover: #f3f4f6;
  --bg-active: #e5e7eb;
  --bg-input: #ffffff;
  --fg: #171717;
  --fg-secondary: #525252;
  --fg-tertiary: #a3a3a3;
  --border: #e5e5e5;
  --border-strong: #d4d4d4;
  --accent: #4f46e5;
  --accent-hover: #4338ca;
  --accent-light: #6366f1;
  --user-bubble: #f3f4f6;
  --assistant-bubble: transparent;
  --code-bg: #f5f5f5;
  --green: #16a34a;
  --red: #dc2626;
  --shadow: 0 4px 24px rgba(0,0,0,.08);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;font-size:14.5px}
button,input,textarea,select{font-family:inherit;font-size:inherit}
#app{display:flex;height:100vh;width:100vw;overflow:hidden;--sidebar-width:280px}

/* Sidebar */
.sidebar{width:var(--sidebar-width);flex-shrink:0;background:var(--bg-elevated);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .25s ease, opacity .2s ease;position:relative}
.resizer{width:6px;position:absolute;right:-3px;top:0;bottom:0;cursor:col-resize;z-index:10;transition:background .15s}
.resizer:hover,.resizer.dragging{background:var(--accent);opacity:.35}
@media (max-width: 768px) {.resizer{display:none}}
.sidebar-header{height:56px;display:flex;align-items:center;padding:0 14px 0 18px;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px;color:var(--fg);display:flex;align-items:center;gap:8px}
.logo::before{content:"";width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:block}
.sidebar-header .spacer{flex:1}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--fg-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--bg-hover);color:var(--fg)}
.icon-btn svg{width:18px;height:18px}
.connect-device-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.connect-device-btn:hover{background:var(--bg-hover);border-color:var(--border-strong)}
.connect-device-btn .plus{font-size:16px;line-height:1;color:var(--accent-light)}

.sidebar-search{padding:12px 14px;flex-shrink:0}
.sidebar-search input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--fg);outline:none;transition:border .15s}
.sidebar-search input::placeholder{color:var(--fg-tertiary)}
.sidebar-search input:focus{border-color:var(--border-strong)}

.sidebar-section-title{padding:8px 18px 6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--fg-tertiary)}
.session-list{flex:1;overflow-y:auto;padding:0 10px}
.session-item{padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:3px;border:1px solid transparent}
.session-item:hover{background:var(--bg-hover)}
.session-item.selected{background:var(--bg-active);border-color:var(--border-strong)}
.session-item .title{font-size:14px;font-weight:500;line-height:1.35;display:flex;align-items:center;gap:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .title .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.session-item .title .dot.active{background:var(--green);box-shadow:0 0 0 2px color-mix(in srgb,var(--green) 20%,transparent)}
.session-item .title .dot.idle{background:var(--fg-tertiary)}
.session-item .meta{font-size:12px;color:var(--fg-secondary);margin-top:4px;display:flex;align-items:center;gap:8px}
.session-item .meta span{display:flex;align-items:center;gap:4px}
.empty{padding:24px 18px;text-align:center;color:var(--fg-tertiary);font-size:13px}

.sidebar-panels{flex-shrink:0;border-top:1px solid var(--border)}
.panel-header{padding:12px 18px;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--fg-secondary);transition:background .12s}
.panel-header:hover{background:var(--bg-hover);color:var(--fg)}
.panel-header svg{width:14px;height:14px;transition:transform .2s;flex-shrink:0}
.panel-header.open svg{transform:rotate(90deg)}
.panel-body{display:none;padding:0 14px 14px}
.panel-body.open{display:block}

.machine-item{padding:8px 10px;border-radius:8px;margin-bottom:4px;background:var(--bg);border:1px solid var(--border)}
.machine-item .name{font-size:13px;font-weight:500}
.machine-item .time{font-size:11px;color:var(--fg-secondary);margin-top:2px}

/* Main chat area */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);position:relative}
.mobile-menu{display:none}
.chat-header{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.chat-header .title{font-size:15px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-header .meta{font-size:12px;color:var(--fg-secondary)}

.messages{flex:1;overflow-y:auto;padding:28px 20px}
.messages-inner{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:24px}

.placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--fg-tertiary);gap:12px;padding:40px}
.placeholder .logo-placeholder{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-light));opacity:.8}
.placeholder h2{font-size:18px;font-weight:600;color:var(--fg)}

.message{display:flex;gap:14px}
.message.user{justify-content:flex-end}
.message .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.message.assistant .avatar{background:var(--accent)}
.message.user .avatar{background:var(--user-bubble);color:var(--fg);border:1px solid var(--border)}
.message .content{max-width:calc(100% - 50px);min-width:0}
.message.assistant .content{max-width:100%}
.message .role{font-size:12px;font-weight:600;color:var(--fg-secondary);margin-bottom:5px}
.message .bubble{font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.message.user .bubble{background:var(--user-bubble);padding:12px 16px;border-radius:18px;border:1px solid var(--border)}
.message.assistant .bubble{padding-right:8px}
.message .bubble p{margin-bottom:.8em}
.message .bubble p:last-child{margin-bottom:0}
.message .bubble code{font-family:"SF Mono","Fira Code",monospace;font-size:13px;background:var(--code-bg);padding:2px 5px;border-radius:4px;color:var(--accent-light)}
.message .bubble pre{position:relative;background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin:12px 0;overflow-x:auto}
.message .bubble pre code{padding:0;background:transparent;color:var(--fg);font-size:13px}
.copy-code{position:absolute;top:8px;right:8px;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--fg-secondary);font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s}
.message .bubble pre:hover .copy-code{opacity:1}
.copy-code:hover{background:var(--bg-hover);color:var(--fg)}

.input-area{padding:16px 20px 24px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.input-wrapper{max-width:820px;margin:0 auto;background:var(--bg-input);border:1px solid var(--border);border-radius:18px;padding:4px;display:flex;align-items:flex-end;gap:8px;box-shadow:var(--shadow);transition:border .15s}
.input-wrapper:focus-within{border-color:var(--border-strong)}
#msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--fg);font-size:15px;line-height:1.5;padding:12px 8px 12px 14px;max-height:180px;min-height:24px;resize:none;font-family:inherit}
#msg-input::placeholder{color:var(--fg-tertiary)}
#send-btn{width:34px;height:34px;border-radius:12px;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:4px;transition:all .15s;flex-shrink:0}
#send-btn:hover{background:var(--accent-hover)}
#send-btn:disabled{background:var(--fg-tertiary);cursor:not-allowed}
#send-btn svg{width:18px;height:18px}
.input-hint{text-align:center;font-size:12px;color:var(--fg-tertiary);margin-top:10px}

/* Connect screen */
#connect-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100}
.connect-card{width:420px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:18px;padding:32px;box-shadow:var(--shadow)}
.connect-card .logo-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.connect-card .logo-wrap .logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-light))}
.connect-card h1{font-size:24px;font-weight:700;text-align:center}
.connect-card p{text-align:center;color:var(--fg-secondary);margin:8px 0 20px;font-size:14px}
.connect-tabs{display:flex;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:18px;position:relative}
.connect-tab{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;color:var(--fg-secondary);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.connect-tab:hover{color:var(--fg)}
.connect-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.35)}
.connect-tab.active:hover{background:var(--accent-hover)}
.connect-form{display:none}
.connect-form.active{display:block}
.connect-card input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--fg);margin-bottom:12px;outline:none;transition:border .15s}
.connect-card input:focus{border-color:var(--accent)}
.connect-card button{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:15px}
.connect-card button:hover{background:var(--accent-hover)}
.connect-card .error{color:var(--red);font-size:13px;margin-top:8px;text-align:center}
.connect-hint{text-align:center;font-size:12px;color:var(--fg-secondary);margin-top:14px}

/* Device connect modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:90;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{width:560px;max-width:calc(100% - 32px);max-height:calc(100vh - 40px);background:var(--bg-elevated);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transform:translateY(10px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-header h2{font-size:17px;font-weight:600;flex:1}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--fg-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1}
.modal-close:hover{background:var(--bg-hover);color:var(--fg)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-section{margin-bottom:24px}
.modal-section:last-child{margin-bottom:0}
.modal-section h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--fg-tertiary);margin-bottom:12px}
.modal-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--fg);outline:none;font-size:15px;margin-bottom:12px;transition:border .15s}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--fg-tertiary)}
.modal-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:15px;transition:background .15s}
.modal-btn:hover{background:var(--accent-hover)}
.modal-btn:disabled{background:var(--bg-active);color:var(--fg-tertiary);cursor:not-allowed}
.generated-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:14px}
.generated-box .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--fg-tertiary);margin-bottom:8px}
.generated-box .url{font-family:"SF Mono","Fira Code",monospace;font-size:13px;word-break:break-all;color:var(--fg);line-height:1.6;background:var(--bg-elevated);padding:12px;border-radius:8px;border:1px solid var(--border)}
.copy-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.copy-row button{flex:1;min-width:140px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--fg);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.copy-row button:hover{background:var(--bg-hover)}
.copy-row button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.copy-row button.primary:hover{background:var(--accent-hover)}
.token-list{margin-top:8px}
.token-list-item{padding:14px;border-radius:10px;background:var(--bg);border:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.token-list-item .info{flex:1;min-width:0}
.token-list-item .name{font-size:14px;font-weight:500;margin-bottom:3px;cursor:text;padding:3px 5px;margin:-3px -5px;border-radius:5px;transition:background .12s}
.token-list-item .name:hover{background:var(--bg-hover)}
.token-list-item .name-edit{width:100%;font-size:14px;font-weight:500;padding:3px 5px;border-radius:5px;border:1px solid var(--accent);background:var(--bg);color:var(--fg);outline:none}
.token-list-item .time{font-size:12px;color:var(--fg-secondary)}
.token-list-item .actions{display:flex;gap:8px}
.token-list-item .actions button{padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--fg);font-size:12px;font-weight:600;cursor:pointer}
.token-list-item .actions button:hover{background:var(--bg-hover)}
.token-list-item .actions button.revoke:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08)}

.hidden{display:none}

@media (max-width: 768px) {
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);opacity:0}
  .sidebar.open{transform:translateX(0);opacity:1}
  .main{width:100%}
  .mobile-menu{display:flex;align-items:center}
  .chat-header{padding-left:12px}
  .messages{padding:20px 14px}
  .messages-inner{max-width:100%}
  .input-area{padding:12px 14px 18px}
  .input-wrapper{max-width:100%}
  .connect-card{width:calc(100% - 32px);padding:24px}
  .modal{width:100%;max-height:100vh;border-radius:0}
}
</style>
</head>
<body>
<div id="app">
  <div id="connect-screen">
    <div class="connect-card">
      <div class="logo-wrap"><div class="logo-mark"></div><h1>CCH</h1></div>
      <p>Connect to your self-hosted server</p>
      <div class="connect-tabs">
        <button class="connect-tab active" data-target="token-form">Token</button>
        <button class="connect-tab" data-target="password-form">Password</button>
      </div>
      <div class="connect-form active" id="token-form">
        <input id="connect-input" type="text" placeholder="Paste connection string or token..." autofocus>
        <button id="connect-btn">Connect</button>
        <p class="error" id="connect-error"></p>
      </div>
      <div class="connect-form" id="password-form">
        <input id="login-username" type="text" placeholder="Username">
        <input id="login-password" type="password" placeholder="Password">
        <button id="login-btn">Sign In</button>
        <p class="error" id="login-error"></p>
      </div>
    </div>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="resizer" id="resizer"></div>
    <div class="sidebar-header">
      <div class="logo">CCH</div>
      <div class="spacer"></div>
      <button class="connect-device-btn" id="open-connect-modal"><span class="plus">+</span><span>Device</span></button>
      <button class="icon-btn" id="theme-btn" title="Toggle theme">🌙</button>
      <button class="icon-btn" id="refresh-btn" title="Refresh">↻</button>
      <button class="icon-btn" id="logout-btn" title="Logout">→</button>
    </div>
    <div class="sidebar-search">
      <input id="session-search" type="text" placeholder="Search sessions...">
    </div>
    <div class="sidebar-section-title">Sessions <span id="scount" style="color:var(--fg-tertiary);font-weight:400">0</span></div>
    <div class="session-list" id="slist"><div class="empty">No sessions yet</div></div>

    <div class="sidebar-panels">
      <div class="panel" id="machines-panel">
        <div class="panel-header" data-target="machines-body"><span class="spacer">Machines</span><span id="mcount">0</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
        <div class="panel-body" id="machines-body"><div class="empty">No machines yet</div></div>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="chat-header">
      <button class="icon-btn mobile-menu" id="menu-btn">☰</button>
      <div class="title" id="chat-title">Select a session</div>
      <div class="meta" id="chat-meta"></div>
    </div>
    <div class="placeholder" id="placeholder">
      <div class="logo-placeholder"></div>
      <h2>Welcome to CCH</h2>
      <p style="color:var(--fg-secondary);font-size:14px">Select a session from the sidebar to view messages.</p>
    </div>
    <div class="messages hidden" id="messages"><div class="messages-inner" id="messages-inner"></div></div>
    <div class="input-area hidden" id="input-area">
      <div class="input-wrapper">
        <textarea id="msg-input" rows="1" placeholder="Send a message..."></textarea>
        <button id="send-btn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9"></polygon></svg></button>
      </div>
      <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
    </div>
  </main>
</div>

<!-- Connect Device Modal -->
<div class="modal-overlay" id="connect-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Connect a Device</h2>
      <button class="modal-close" id="close-connect-modal">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>Generate New Token</h3>
        <input id="tk-label" class="modal-input" type="text" placeholder="Label, e.g. macbook-pro">
        <button id="gen-tk-btn" class="modal-btn">Generate Token</button>
        <p class="error" id="tk-error" style="text-align:center;margin-top:10px"></p>
        <div id="new-tk-area" class="hidden">
          <div class="generated-box">
            <div class="label">Connection URL</div>
            <div class="url" id="new-conn"></div>
            <div class="copy-row">
              <button id="copy-cch-btn" class="primary">Copy for cch</button>
              <button id="copy-ccd-btn">Copy for ccd</button>
              <button id="copy-url-btn">Copy raw URL</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-section">
        <h3>Active Tokens</h3>
        <div id="tk-list" class="token-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="/user.js"></script>
</body>
</html>
