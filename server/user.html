<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCH</title>
<style>
:root {
  --bg: #f7f5f3; --bg2: #ffffff; --bg3: #f0eeec;
  --fg: #1a1a1a; --fg2: #8b8a88; --fg3: #5e5d5b;
  --bd: #e2e0dd; --accent: #d97736; --accent-h: #c56a2c;
  --green: #1b8a3d; --red: #d93838;
  --term-bg: #1a1a1a; --term-fg: #a5d6a5;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
}
[data-theme="dark"] {
  --bg: #1a1a1a; --bg2: #252525; --bg3: #2e2e2e;
  --fg: #e8e6e3; --fg2: #8b8a88; --fg3: #b0aeac;
  --bd: #363432; --accent: #d97736; --accent-h: #e08a4a;
  --green: #3fb950; --red: #f85149;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5}
#app{max-width:1200px;margin:0 auto;height:100vh;display:flex;flex-direction:column}

/* topbar */
.topbar{display:flex;align-items:center;padding:12px 24px;gap:12px;flex-shrink:0}
.topbar .logo{font-size:18px;font-weight:700;color:var(--accent);flex:1}
.topbar button{font-size:13px;padding:6px 14px;border:1px solid var(--bd);border-radius:8px;background:var(--bg2);color:var(--fg);cursor:pointer;transition:all .15s}
.topbar button:hover{background:var(--bg3)}
.topbar .accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar .accent:hover{background:var(--accent-h)}

/* main layout */
.main{flex:1;display:flex;overflow:hidden;border-top:1px solid var(--bd)}

/* sidebar */
.sidebar{width:300px;flex-shrink:0;overflow-y:auto;padding:16px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;gap:4px}
.sidebar h3{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--fg2);letter-spacing:.5px;margin:8px 0 4px}
.sidebar .card{padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .12s;border:1.5px solid transparent}
.sidebar .card:hover{background:var(--bg3)}
.sidebar .card.selected{border-color:var(--accent);background:var(--bg3)}
.sidebar .card .title{font-size:13px;font-weight:600}
.sidebar .card .meta{font-size:11px;color:var(--fg2);margin-top:2px}
.sidebar .empty{text-align:center;color:var(--fg2);font-size:13px;padding:24px 0}
.sidebar .token-box{margin-top:auto;padding-top:12px;border-top:1px solid var(--bd)}
.sidebar .token-box input{width:100%;font-size:12px;padding:8px;border:1px solid var(--bd);border-radius:6px;background:var(--bg);color:var(--fg);margin-bottom:6px}
.sidebar .token-box button{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--bg2);color:var(--fg);cursor:pointer}
.sidebar .token-box button:hover{background:var(--bg3)}

/* detail */
.detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--fg2);font-size:15px}
.term-container{flex:1;display:flex;flex-direction:column;overflow:hidden;display:none}
.term-container.active{display:flex}
.term-header{padding:12px 20px;border-bottom:1px solid var(--bd);font-size:13px;display:flex;align-items:center;gap:8px}
.term-body{flex:1;overflow-y:auto;padding:16px 20px;font-family:"SF Mono","Fira Code",monospace;font-size:13px;line-height:1.6}
.term-body.light-text{background:var(--bg2);color:var(--fg)}
.term-body.dark-text{background:var(--term-bg);color:var(--term-fg)}
.msg{margin-bottom:16px}
.msg .role{font-size:11px;font-weight:600;margin-bottom:2px}
.msg.user .role{color:#539bf5}
.msg.assistant .role{color:var(--green)}
.msg .content{white-space:pre-wrap;word-break:break-word}
.term-input-bar{display:flex;align-items:center;padding:12px 20px;border-top:1px solid var(--bd);background:var(--bg2);gap:8px}
.term-input-bar .prompt{color:var(--accent);font-weight:700;font-size:14px;flex-shrink:0}
.term-input-bar input{flex:1;border:none;background:transparent;font-family:"SF Mono","Fira Code",monospace;font-size:13px;color:var(--fg);outline:none}
.term-input-bar input::placeholder{color:var(--fg2)}
.term-input-bar button{padding:6px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.term-input-bar button:hover{background:var(--accent-h)}

/* badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-active{background:#d4f0dc;color:var(--green)}
.badge-idle{background:var(--bg3);color:var(--fg2)}

/* connect screen */
#connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
#connect-screen .c-card{background:var(--bg2);border-radius:12px;padding:32px;width:420px;box-shadow:var(--shadow)}
#connect-screen h1{font-size:24px;color:var(--accent);margin-bottom:4px}
#connect-screen p{color:var(--fg2);margin-bottom:16px;font-size:14px}
#connect-screen input{width:100%;font-size:14px;padding:12px;border:1.5px solid var(--bd);border-radius:8px;margin-bottom:12px;background:var(--bg);color:var(--fg)}
#connect-screen input:focus{border-color:var(--accent);outline:none}
#connect-screen button{width:100%;font-size:14px;padding:12px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600}
#connect-screen button:hover{background:var(--accent-h)}
.error{color:var(--red);font-size:12px;margin-top:4px}
.hidden{display:none}

@media(max-width:768px){.main{flex-direction:column}.sidebar{width:100%;max-height:45vh}}
</style>
</head>
<body>
<div id="app">
  <!-- connect screen -->
  <div id="connect-screen">
    <div class="c-card">
      <h1>CCH</h1>
      <p>Connect to your self-hosted server</p>
      <input id="connect-input" type="text" placeholder="Paste connection string or token..." autofocus>
      <button id="connect-btn">Connect</button>
      <p class="error" id="connect-error"></p>
    </div>
  </div>

  <!-- main dashboard -->
  <div id="dashboard" class="hidden" style="display:none;flex-direction:column;height:100vh">
    <div class="topbar">
      <div class="logo">CCH</div>
      <span style="font-size:12px;color:var(--fg2)" id="acct-display"></span>
      <button id="theme-btn">🌙</button>
      <button id="refresh-btn">Refresh</button>
      <button class="accent" id="logout-btn">Logout</button>
    </div>
    <div class="main">
      <div class="sidebar">
        <h3>Sessions (<span id="scount">0</span>)</h3>
        <div id="slist"></div>
        <h3>Machines (<span id="mcount">0</span>)</h3>
        <div id="mlist"></div>
        <div class="token-box">
          <h3>Connect a Device</h3>
          <input id="tk-label" type="text" placeholder="Label, e.g. macbook-pro">
          <button id="gen-tk-btn">Generate Token</button>
          <p class="error" id="tk-error"></p>
          <div id="new-tk-area" class="hidden" style="margin-top:8px">
            <div style="font-family:monospace;font-size:11px;background:var(--bg3);padding:6px 8px;border-radius:4px;word-break:break-all" id="new-conn"></div>
            <button style="margin-top:4px" id="copy-tk-btn">Copy</button>
          </div>
          <div id="tk-list" style="margin-top:8px;font-size:11px"></div>
        </div>
      </div>
      <div class="detail">
        <div class="placeholder" id="no-selection">Select a session to view details</div>
        <div class="term-container" id="term-container">
          <div class="term-header" id="term-header"></div>
          <div class="term-body light-text" id="term-body"></div>
          <div class="term-input-bar">
            <span class="prompt">></span>
            <input id="msg-input" type="text" placeholder="Send a message...">
            <button id="send-btn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/user.js"></script>
</body>
</html>
