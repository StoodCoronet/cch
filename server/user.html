<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCH</title>
<style>
:root {
  --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eaeef2;
  --fg: #1f2328; --fg2: #656d76; --bd: #d0d7de;
  --btn: #f6f8fa; --btn-hover: #eaeef2;
  --green: #1a7f37; --red: #cf222e;
  --term-bg: #0d1117; --term-fg: #7ee787;
  --card: #ffffff;
}
[data-theme="dark"] {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --fg: #e6edf3; --fg2: #8b949e; --bd: #30363d;
  --btn: #21262d; --btn-hover: #30363d;
  --green: #3fb950; --red: #f85149;
  --card: #161b22;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--bd);gap:8px;background:var(--bg2)}
.topbar h1{font-size:16px;flex:1}
.topbar button{font-size:12px;padding:4px 10px;border:1px solid var(--bd);border-radius:4px;background:var(--btn);color:var(--fg);cursor:pointer}
.topbar button:hover{background:var(--btn-hover)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;border-right:1px solid var(--bd);overflow-y:auto;padding:12px;background:var(--bg2)}
.sidebar h2{font-size:12px;color:var(--fg2);text-transform:uppercase;margin:12px 0 6px}
.sidebar .item{padding:8px;border-radius:4px;cursor:pointer;font-size:13px;border:1px solid transparent;margin-bottom:4px}
.sidebar .item:hover{background:var(--bg3)}
.sidebar .item.active{border-color:var(--green);background:var(--bg3)}
.sidebar .item .sub{font-size:11px;color:var(--fg2)}
.detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail-header{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:13px}
.detail-header code{font-family:monospace;font-size:12px}
.term{flex:1;background:var(--term-bg);color:var(--term-fg);font-family:monospace;font-size:13px;padding:12px;overflow-y:auto;white-space:pre-wrap;display:none}
.term.active{display:block}
.term-msg{margin-bottom:4px}
.term-msg.role-user{color:#58a6ff}
.term-input{display:flex;border-top:1px solid var(--bd);padding:8px;background:var(--term-bg);display:none}
.term-input.active{display:flex}
.term-input input{flex:1;background:transparent;border:none;color:var(--term-fg);font-family:monospace;font-size:13px;outline:none}
.term-input input::placeholder{color:var(--fg2)}
.term-input button{background:var(--green);color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--fg2);font-size:14px}
.empty{text-align:center;padding:24px;color:var(--fg2);font-size:13px}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
.badge-active{background:var(--green);color:#fff}
.badge-idle{background:var(--fg2);color:var(--bg)}
.btn-sm{font-size:11px;padding:2px 6px;border:1px solid var(--bd);border-radius:3px;background:var(--btn);color:var(--fg);cursor:pointer}
.btn-sm:hover{background:var(--btn-hover)}
.btn-sm.danger{color:var(--red);border-color:var(--red)}
.token-area{margin-top:8px;padding:8px;border-top:1px solid var(--bd);font-size:12px}
.token-area input{width:100%;font-size:12px;padding:4px 8px;border:1px solid var(--bd);border-radius:4px;background:var(--bg);color:var(--fg)}
.token-area button{margin-top:4px;font-size:11px;padding:3px 8px}
.conn-str{font-family:monospace;font-size:11px;background:var(--bg3);padding:4px 8px;border-radius:4px;word-break:break-all;margin:4px 0}
#connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
#connect-screen .card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:24px;width:100%;max-width:400px}
#connect-screen input{width:100%;font-size:14px;padding:10px;border:1px solid var(--bd);border-radius:6px;margin-bottom:8px;background:var(--bg);color:var(--fg)}
#connect-screen button{width:100%;font-size:14px;padding:10px;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600}
.error{color:var(--red);font-size:12px;margin-top:4px}
@media(max-width:768px){.main{flex-direction:column}.sidebar{width:100%;max-height:40vh}}
</style>
</head>
<body>
<div id="connect-screen">
  <div class="card">
    <h1>CCH</h1>
    <p style="color:var(--fg2);margin-bottom:12px">Connect to your server</p>
    <input id="connect-input" type="text" placeholder="Paste connection string or token...">
    <button id="connect-btn">Connect</button>
    <p class="error" id="connect-error"></p>
  </div>
</div>

<div id="main-screen" class="hidden" style="display:none;flex-direction:column;height:100vh">
  <div class="topbar">
    <h1>CCH</h1>
    <span style="font-size:12px;color:var(--fg2)" id="acct-display"></span>
    <button id="theme-btn">🌙</button>
    <button id="refresh-btn">Refresh</button>
    <button id="logout-btn">Logout</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <h2>Sessions (<span id="scount">0</span>)</h2>
      <div id="slist"></div>
      <h2>Machines (<span id="mcount">0</span>)</h2>
      <div id="mlist"></div>
      <div class="token-area">
        <h2>Connect a Device</h2>
        <input id="tk-label" type="text" placeholder="Label, e.g. macbook-pro">
        <button id="gen-tk-btn">Generate Token</button>
        <p class="error" id="tk-error"></p>
        <div id="new-tk-area" class="hidden">
          <div class="conn-str" id="new-conn"></div>
          <button class="btn-sm" id="copy-tk-btn">Copy</button>
        </div>
        <div id="tk-list" style="margin-top:8px"></div>
      </div>
    </div>
    <div class="detail" id="detail">
      <div class="placeholder" id="no-selection">Select a session from the list</div>
      <div class="detail-header hidden" id="detail-head"></div>
      <div class="term" id="term"></div>
      <div class="term-input" id="term-input">
        <span style="color:var(--green);margin-right:4px">></span>
        <input id="msg-input" type="text" placeholder="Type a message...">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>
</div>
<script src="/user.js"></script>
</body>
</html>
