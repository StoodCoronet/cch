name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: gh-deploy
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd $HOME/cch-server
            git pull origin main
            docker compose up -d --build
            docker compose ps
