name: Deploy to Aliyun ECS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build
        run: sleep 120

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: gh-deploy
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd $HOME/cch-server
            docker compose pull
            docker compose down
            docker compose up -d
            docker compose ps
