name: Deploy to Aliyun ECS

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: gh-deploy
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd $HOME/cch-server
            docker compose pull
            docker compose down
            docker compose up -d
            docker compose ps
